global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ─── ALERTING RULES FILE ─────────────────────────────────────────────────────
rule_files:
  - "alert_rules.yml"

# ─── SCRAPE TARGETS ──────────────────────────────────────────────────────────
scrape_configs:

  - job_name: "secureops-sentinel"
    static_configs:
      - targets: ["app:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
